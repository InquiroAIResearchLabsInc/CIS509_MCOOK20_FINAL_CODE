name: Weekly refresh

on:
  schedule:
    # Sundays at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  refresh:
    name: Refresh top 10 + receipts + dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lean deps (no torch, --skip-topics path)
        # Weekly refresh passes --skip-topics, so the heavy ML stack is not
        # needed. Lean install is ~30s vs ~5min for the full requirements.txt.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-base.txt

      - name: Run pipeline on a 50-business random sample
        # GROQ_API_KEY is OPTIONAL. If unset, LLMClient falls back to the
        # cached predictions in outputs/llm_agreement.csv (or no-ops cleanly).
        # Set it as a repo secret only if you want live LLM refreshes.
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Sample a population of reviews from 50 random businesses by
          # subsetting to roughly the volume those 50 represent. The exact
          # arithmetic happens inside the pipeline; --sample sets a cap.
          PYTHONPATH=. python run_pipeline.py --skip-topics

      - name: Verify all receipts dual-hash
        run: |
          PYTHONPATH=. python - <<'PYEOF'
          import json, sys
          from pathlib import Path
          from src.receipts import verify_receipt
          failed = []
          for p in sorted(Path("outputs/receipts").glob("*.json")):
              if not verify_receipt(json.loads(p.read_text())):
                  failed.append(p.name)
          if failed:
              sys.exit(f"Verification failed: {failed[:5]}")
          print("All receipts verified")
          PYEOF

      - name: Commit refreshed outputs
        run: |
          git config user.name "tabhs-bot"
          git config user.email "tabhs-bot@users.noreply.github.com"
          git add outputs/top_10_manipulated.csv outputs/receipts/ outputs/dashboard.html outputs/figures/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$(cat <<'EOF'
          refresh(weekly): top 10 + receipts + dashboard

          Auto-generated by .github/workflows/weekly_refresh.yml.

          Receipt: business_tabhs (regenerated)
          SLO: receipts dual-hash verified
          Gate: post
          EOF
          )"
            git push
          fi
