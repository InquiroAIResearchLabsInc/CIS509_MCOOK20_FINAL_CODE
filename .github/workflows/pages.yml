name: Publish dashboard to GitHub Pages

# Canonical Pages-via-Actions pattern: run on every push to main, plus a
# manual trigger. The path filter is intentionally absent so any change
# to the repo (docs, receipts, code) re-publishes the dashboard.
#
# We do NOT run on feature branches because the github-pages environment
# is created with a default policy that only allows the repo's default
# branch to deploy. Trying to deploy from claude/** fails with
# "Branch ... is not allowed to deploy to github-pages due to environment
# protection rules". Merging to main is the supported path.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy outputs/ to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          set -euo pipefail
          mkdir -p _site
          # Pages serves _site/ at the repo URL; dashboard.html becomes index.html
          # so the professor lands on the dashboard with one click.
          cp outputs/dashboard.html _site/index.html
          cp outputs/dashboard.html _site/dashboard.html
          cp outputs/top_10_manipulated.csv _site/top_10_manipulated.csv
          cp -r outputs/figures _site/figures
          cp -r outputs/receipts _site/receipts
          # .nojekyll prevents Pages from running Jekyll, which would skip
          # files starting with _ and break some asset paths.
          touch _site/.nojekyll
          cat > _site/robots.txt <<'EOF'
          User-agent: *
          Allow: /
          EOF
          echo "site staged: $(find _site -type f | wc -l) files"

      - name: Verify dashboard is populated
        run: |
          set -euo pipefail
          test -s _site/index.html
          grep -q "TABHS_DATA" _site/index.html
          if grep -q "__TABHS_DATA__" _site/index.html; then
            echo "FAIL: TABHS_DATA placeholder was not expanded"
            exit 1
          fi
          echo "dashboard OK, $(wc -c < _site/index.html) bytes"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
