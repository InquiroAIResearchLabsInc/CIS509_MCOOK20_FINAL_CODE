name: Publish dashboard to GitHub Pages

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "outputs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy outputs/ to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          # Pages serves _site/ at the repo URL; dashboard.html becomes index.html
          # so the professor lands on the dashboard with one click.
          cp outputs/dashboard.html _site/index.html
          cp outputs/dashboard.html _site/dashboard.html
          cp outputs/top_10_manipulated.csv _site/top_10_manipulated.csv
          cp -r outputs/figures _site/figures
          cp -r outputs/receipts _site/receipts
          # Tell crawlers + clients this is a static, mobile-ready site
          cat > _site/robots.txt <<'EOF'
          User-agent: *
          Allow: /
          EOF

      - name: Verify dashboard is populated
        run: |
          test -s _site/index.html
          grep -q "TABHS_DATA" _site/index.html
          ! grep -q "__TABHS_DATA__" _site/index.html
          echo "dashboard OK, $(wc -c < _site/index.html) bytes"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
